<svg width="900" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #1e1e2e; }
    .text { font-family: monospace; font-size: 18px; fill: #cdd6f4; }
    .green { fill: #50fa7b; }
    .yellow { fill: #f1fa8c; }
    .blue { fill: #8be9fd; }
    .pink { fill: #ff79c6; }
  </style>

  <rect class="bg" width="100%" height="100%" rx="10"/>

  <!-- Terminal header -->
  <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="20" r="6" fill="#27c93f"/>

  <!-- Content -->
  <text x="20" y="60" class="pink">anis-mselmi@github.com</text>
  <text x="260" y="60" class="green">:~$ whoami</text>

  <text x="20" y="90" class="text">ANIS MSELMI</text>

  <text x="20" y="130" class="pink">anis-mselmi@github.com</text>
  <text x="260" y="130" class="green">:~$ neofetch</text>

  <text x="20" y="170" class="yellow">---------------------------</text>

  <text x="20" y="200" class="text">OS: GitHub</text>
  <text x="20" y="230" class="text">Role: Developer</text>
  <text x="20" y="260" class="text">Stack: Python, Django, JS</text>
  <text x="20" y="290" class="text">Focus: AI & Security</text>

  <text x="20" y="330" class="pink">anis-mselmi@github.com</text>
  <text x="260" y="330" class="green">:~$ uptime</text>
</svg>
