<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 35" width="100%" height="35">
  <defs>
    <!-- Light Mode Gradient: Vibrant deep/royal blue to electric blue -->
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0052D4" />
      <stop offset="50%" stop-color="#4364F7" />
      <stop offset="100%" stop-color="#6FB1FC" />
    </linearGradient>
    <!-- Dark Mode Gradient: Neon cyan to electric blue -->
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#4FACFE" />
      <stop offset="100%" stop-color="#00F2FE" />
    </linearGradient>
  </defs>
  <style>
    .text {
      font-family: 'Fira Code', Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
      font-size: 19px;
      font-weight: 600;
      letter-spacing: 0.5px;
      fill: url(#lightGrad);
      text-anchor: middle;
      dominant-baseline: middle;
    }
    @media (prefers-color-scheme: dark) {
      .text {
        fill: url(#darkGrad);
      }
    }
  </style>
  <text x="50%" y="17.5" class="text">AI &amp; DevOps Developer | LLMs • RAG • Machine Learning</text>
</svg>
