name: Update Github Stats

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "47 2 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Generate SVG
        run: node dist/bin/github-stats-terminal.js anis-mselmi dracula

      - name: Commit SVG
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add github_stats.svg
          git commit -m "update stats" || echo "no changes"
          git push
