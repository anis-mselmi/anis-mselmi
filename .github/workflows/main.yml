name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache: npm  # keep disabled unless you commit a lockfile

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test
